name: Trator Lotofacil
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 23 * * 1-6' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Instalar Bibliotecas
        run: pip install requests urllib3
        
      - name: Rodar o Robo Agora
        run: python robo.py
