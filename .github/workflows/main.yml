name: Atualizar Firebase Loterias

on:
  schedule:
    # Este código "*/5 * * * *" significa: Rodar a CADA 5 MINUTOS, todos os dias.
    - cron: '*/5 * * * *' 
  workflow_dispatch: # Permite rodar manualmente no botão sempre que quiser

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium firebase-admin
        
    - name: Run script
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: python robo.py
