name: Robo Loterias Nuvem Blindada

on:
  schedule:
    # Horários de Brasília (BRT). O GitHub usa o horário de Londres (UTC+0).
    # Somamos 3 horas para bater exatamente com o Termux:
    - cron: '0 12 * * *'  # Roda às 09:00 BRT
    - cron: '0 19 * * *'  # Roda às 16:00 BRT
    - cron: '0 0 * * *'   # Roda às 21:00 BRT
    - cron: '0 1 * * *'   # Roda às 22:00 BRT
    - cron: '0 2 * * *'   # Roda às 23:00 BRT
  workflow_dispatch:      # Botão mágico para você testar manualmente

jobs:
  executar-processamento:
    runs-on: ubuntu-latest
      
    steps:
      - name: 📥 Puxar o código do repositório
        uses: actions/checkout@v4
        
      - name: 🐍 Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 Instalar Dependências
        run: pip install requests
        
      - name: 🚀 Rodar o Robô
        run: python robo.py
