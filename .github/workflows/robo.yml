name: Robô Loterias - Atualização Automática

on:
  schedule:
    # Horários convertidos para UTC (Brasília + 3h)
    # Roda às: 09h, 16h, 21h, 22h e 23h (Horário de Brasília)
    - cron: '0 0,1,2,12,19 * * *'
  
  # Permite que você rode manualmente clicando em um botão no GitHub
  workflow_dispatch:

jobs:
  run-robot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Rodar o Robô
      env:
        # Puxa a chave do banco de dados configurada nos Secrets do GitHub
        FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
      run: |
        python main.py
