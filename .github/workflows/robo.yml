name: Robo Loterias Nuvem Blindada

on:
  schedule:
    # Cronograma conforme solicitado (Horários UTC, ajustados para BRT -3h)
    - cron: '0 19 * * *'  # 16:00 BRT
    - cron: '30 0 * * *'  # 21:30 BRT
    - cron: '0 1 * * *'   # 22:00 BRT
    - cron: '30 2 * * *'  # 23:30 BRT
    - cron: '0 12 * * *'  # 09:00 BRT (Repescagem Dia Seguinte)
  workflow_dispatch:      # Permite rodar manualmente pelo botão

jobs:
  executar-processamento:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar Dependências
        run: pip install requests
        
      - name: Rodar Motor Principal
        run: python main.py
        env:
          # Adicione o segredo no GitHub: Settings > Secrets > Actions
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
