name: Robo Loterias Nuvem

on:
  schedule:
    - cron: '0 19 * * *'  # 16:00 BRT
    - cron: '30 0 * * *'  # 21:30 BRT
    - cron: '0 1 * * *'   # 22:00 BRT
    - cron: '30 2 * * *'  # 23:30 BRT
    - cron: '0 12 * * *'  # 09:00 BRT (Dia seguinte)
  workflow_dispatch:

jobs:
  rodar-robo:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar os arquivos
        uses: actions/checkout@v4
        
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar Requests
        run: pip install requests
        
      - name: Executar o Cerebro
        run: python main.py
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
